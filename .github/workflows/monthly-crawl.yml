name: 매월 매장 크롤링 + 매출 동기화

on:
  schedule:
    # 매월 1~7일 매일 21:00 UTC = 06:00 KST 트리거
    # 스크립트가 그 중 첫 영업일에만 실제 작업 수행
    - cron: '0 21 1-7 * *'
  workflow_dispatch:  # 수동 트리거 허용 (테스트용)

jobs:
  crawl-and-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 첫 영업일 확인
        id: check
        run: node scripts/is_first_biz_day.js

      - name: 의존성 설치 (Puppeteer 포함)
        if: steps.check.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          npm install
          # Puppeteer Chromium 설치 (Ubuntu 의존성)
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64 || true

      - name: 5개 브랜드 크롤링
        if: steps.check.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        run: node crawlers/run_all.js

      - name: 변경사항 분석
        if: steps.check.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        run: node diff_stores.js crawled.json

      - name: pending 결과 브랜치에 커밋
        if: steps.check.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="pending/${{ steps.check.outputs.month }}"
          git checkout -b "$BRANCH"
          # .gitignore에 들어있는 파일들 강제 추가 (-f)
          git add -f diff_report.md pending_changes.json crawled.json
          git commit -m "자동 크롤링: ${{ steps.check.outputs.month }} (검토 대기)"
          git push --force origin "$BRANCH"

      - name: GitHub Issue 생성 (검토 요청)
        if: steps.check.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "📋 ${{ steps.check.outputs.month }} 매장 업데이트 검토"
          content-filepath: ./diff_report.md
          labels: |
            monthly-update
            review-needed

  # ───────────────────────────────────────
  # 매출 데이터 자동 동기화 (Google Sheets API)
  # ───────────────────────────────────────
  sync-sales:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 첫 영업일 확인
        id: check
        run: node scripts/is_first_biz_day.js

      - name: 매출 데이터 동기화 (API에서 fetch)
        if: steps.check.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        run: node sync_sales.js --fetch

      - name: 신규 파일 적용
        if: steps.check.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          [ -f sales_data.js.new ] && mv sales_data.js.new sales_data.js || echo "sales_data 변경 없음"
          [ -f brand_history.js.new ] && mv brand_history.js.new brand_history.js || echo "brand_history 변경 없음"

      - name: 변경사항 감지 + 커밋
        if: steps.check.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        id: salescommit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet sales_data.js brand_history.js 2>/dev/null; then
            echo "변경 없음"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git add sales_data.js brand_history.js
            git commit -m "매출 데이터 동기화 (${{ steps.check.outputs.month }})"
            git push origin main
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Sync 리포트 GitHub Issue 생성
        if: (steps.check.outputs.run == 'true' || github.event_name == 'workflow_dispatch') && steps.salescommit.outputs.changed == 'true'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "💰 ${{ steps.check.outputs.month }} 매출 데이터 동기화 결과"
          content-filepath: ./sync_report.md
          labels: |
            monthly-update
            sales-sync
